apiVersion: 1
groups:
  - orgId: 1
    name: Infrastructure
    folder: Alerts
    interval: 1m
    rules:
      - uid: vm-down
        title: VM Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              expr: up{job=~".*VM.*"}
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
                  query:
                    params: [A]
        for: 1m
        annotations:
          summary: "VM {{ $labels.instance }} is down"
        labels:
          severity: critical

      - uid: high-cpu
        title: High CPU Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [85]
                  query:
                    params: [A]
        for: 5m
        annotations:
          summary: "High CPU on {{ $labels.instance }}: {{ $values.A }}%"
        labels:
          severity: warning

      - uid: high-memory
        title: High Memory Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              expr: 100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
                  query:
                    params: [A]
        for: 5m
        annotations:
          summary: "High memory on {{ $labels.instance }}: {{ $values.A }}%"
        labels:
          severity: warning

      - uid: disk-filling
        title: Disk Filling Up
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              expr: 100 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100)
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [80]
                  query:
                    params: [A]
        for: 5m
        annotations:
          summary: "Disk usage high on {{ $labels.instance }}: {{ $values.A }}%"
        labels:
          severity: warning

      - uid: container-down
        title: Container Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              expr: podman_container_running_state == 0
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  query:
                    params: [A]
        for: 1m
        annotations:
          summary: "Container {{ $labels.name }} is down on {{ $labels.instance }}"
        labels:
          severity: critical

      - uid: nginx-errors
        title: Nginx High Error Rate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              expr: rate(nginx_http_requests_total{status=~"5.."}[5m])
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
                  query:
                    params: [A]
        for: 5m
        annotations:
          summary: "High Nginx error rate on {{ $labels.instance }}"
        labels:
          severity: warning

      - uid: postgres-connections
        title: Postgres High Connections
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              expr: sum by(instance) (pg_stat_activity_count)
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [80]
                  query:
                    params: [A]
        for: 5m
        annotations:
          summary: "High Postgres connections on {{ $labels.instance }}: {{ $values.A }}"
        labels:
          severity: warning
